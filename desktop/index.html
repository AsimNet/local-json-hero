<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Local JSON Hero desktop viewer for JSON, JSONL, and NDJSON files."
    />
    <title>Local JSON Hero</title>
    <script>
      function showBootError(message) {
        var root = document.getElementById("root");
        if (!root) return;
        root.innerHTML =
          '<div style="font: 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; padding: 24px; color: #991b1b; background: #fff7f7; min-height: 100vh; box-sizing: border-box;">' +
          '<h1 style="font-size: 18px; margin: 0 0 8px;">Local JSON Hero could not start</h1>' +
          '<pre style="white-space: pre-wrap; line-height: 1.5;">' +
          String(message).replace(/[<>&]/g, function (char) {
            return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[char];
          }) +
          "</pre></div>";
      }

      window.addEventListener("error", function (event) {
        showBootError(event.message || event.error || "Unknown startup error");
      });

      window.addEventListener("unhandledrejection", function (event) {
        showBootError(
          event.reason && event.reason.message
            ? event.reason.message
            : event.reason || "Unknown async startup error"
        );
      });

      window.__JSONHERO_DESKTOP__ = true;
    </script>
  </head>
  <body class="overscroll-none">
    <div id="root">
      <div
        style="font: 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; padding: 24px; color: #475569;"
      >
        Starting Local JSON Hero…
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
